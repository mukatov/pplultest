name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy google-token function
        run: |
          supabase functions deploy google-token \
            --no-verify-jwt \
            --project-ref qdliyanbtrukhjwdlffn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Disable JWT verification via Management API
        run: |
          curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/qdliyanbtrukhjwdlffn/functions/google-token" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"verify_jwt": false}'

      - name: Set function secrets
        run: |
          supabase secrets set \
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            --project-ref qdliyanbtrukhjwdlffn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
